<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOQM 2025 Easy</title>

<!-- Particles.js for dynamic background -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.10.1/tsparticles.min.js"></script>

<style>
html, body {
    margin:0; padding:0; width:100%; height:100%;
    font-family: Arial; color:#fff;
    background:#0a0a0a;
    overflow-x:hidden;
}

#particles-js {
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
}

#content {
    position:relative;
    z-index:1;
    max-width:900px;
    margin:50px auto;
    padding:20px;
    background: rgba(0,0,0,0.5);
    border-radius:15px;
    box-shadow: 0 0 30px #0ff;
}

h1 { text-align:center; color:#0ff; text-shadow:0 0 20px #0ff; margin-bottom:30px; }

.question { margin-bottom:25px; padding:15px; background: rgba(0,0,0,0.3); border-radius:10px; }
.question p { font-size:18px; margin-bottom:10px; }

input.answer-input {
    width:80px; padding:5px; font-size:16px; border-radius:8px;
    border:2px solid #0ff; background:#111; color:#0ff; text-align:center;
}

button {
    padding:6px 12px; margin:5px; font-size:16px;
    border-radius:8px; border:none; cursor:pointer;
    background:#0ff; color:#000;
    transition: all 0.3s ease;
}

button:hover { box-shadow:0 0 20px #0ff; transform: scale(1.05); }

.solution { display:none; background:rgba(255,255,255,0.1); padding:10px; margin-top:10px; border-radius:8px; }
</style>
</head>
<body>

<div id="particles-js"></div>

<div id="content">
    <h1>IOQM 2025 Easy</h1>
    <div id="questions-container"></div>
</div>

<script>
// ---------- Questions Data ----------
const questions = [
    { q:"Find the number of positive integers n ≤ 100, divisible by 3 but not by 2.", a:17 },
    { q:"If 60% of a number x is 40, then what is x% of 60?", a:40 },
    { q:"The area of an integer-sided rectangle is 20. What is the minimum possible value of its perimeter?", a:18 },
    { q:"How many isosceles integer-sided triangles are there with perimeter 23?", a:6 },
    { q:"How many 3-digit numbers abc in base 10 are there with a ≠ 0 and c = a + b?", a:45 },
    { q:"The age of a person in 2025 is a perfect square. His age was also a perfect square in 2012. His age will be a perfect cube m years after 2025. Determine the smallest value of m.", a:15 },
    { q:"The sum of two real numbers is a positive integer n and the sum of their squares is n + 1012. Find the maximum possible value of n.", a:46 },
    { q:"A quadrilateral has four vertices A, B, C, D. Colour each vertex in one of four colours so that every side of the quadrilateral and diagonal AC have endpoints of different colours. In how many ways?", a:48 },
    { q:"Four sides and a diagonal of a quadrilateral are of lengths 10, 20, 28, 50, 75, not necessarily in order. Which is the only possible length of the diagonal?", a:28 },
    { q:"The height and base radius of a closed right circular cylinder are positive integers and its total surface area equals its volume. If its volume is kπ, what is the smallest possible value of k?", a:54 },
];

// ---------- Run after page load ----------
window.onload = function() {

    // ---------- Particle Background ----------
    tsParticles.load("particles-js", {
        particles: {
            number: { value: 80 },
            color: { value: ["#0ff","#ff0","#f0f"] },
            shape: { type: "circle" },
            opacity: { value: 0.5, random:true },
            size: { value: 3, random:true },
            move: { enable:true, speed:2, direction:"none", outMode:"bounce" },
            links: { enable:true, distance:150, color:"#0ff", opacity:0.2, width:1 }
        },
        interactivity: { events:{ onHover:{ enable:true, mode:"repulse" } }, modes:{ repulse:{ distance:100 } } },
        background: { color:"#0a0a0a" }
    });

    // ---------- Render Questions ----------
    const container = document.getElementById('questions-container');
    questions.forEach((qObj, index) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <p><strong>Q${index+1}:</strong> ${qObj.q}</p>
            <input type="number" class="answer-input" min="0" max="1000">
            <button onclick="checkAnswer(this, ${qObj.a})">Check Answer</button>
            <button onclick="toggleSolution(this)">Show Solution</button>
            <div class="solution">Solution: ${qObj.a}</div>
        `;
        container.appendChild(div);
    });
};

// ---------- Check Answer ----------
function checkAnswer(btn, correct) {
    const input = btn.previousElementSibling;
    const val = parseInt(input.value);
    if(isNaN(val)) { alert("Enter a number!"); return; }
    if(val === correct) alert("✅ Correct!"); else alert("❌ Incorrect!");
}

// ---------- Toggle Solution ----------
function toggleSolution(btn) {
    const sol = btn.nextElementSibling;
    sol.style.display = sol.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
