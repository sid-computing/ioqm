<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOQM Past Papers</title>
<style>
body { font-family: Arial; background:#0a0a0a; color:#fff; text-align:center; padding:50px; }
select, button { padding:10px; margin:10px; font-size:16px; }
</style>
</head>
<body>
<h1>IOQM Past Papers</h1>

<label for="year-select">Year:</label>
<select id="year-select">
    <option value="">--Select Year--</option>
    <option value="2023">2023</option>
    <option value="2024">2024</option>
    <option value="2025">2025</option>
</select>

<label for="difficulty-select">Difficulty:</label>
<select id="difficulty-select">
    <option value="">--Select Difficulty--</option>
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>

<br>
<button onclick="startPaper()">Start Paper</button>

<script>
function startPaper() {
    const year = document.getElementById('year-select').value;
    const diff = document.getElementById('difficulty-select').value;

    if(!year || !diff) { alert("Select both!"); return; }

    // Go to the separate HTML page for that year/difficulty
    window.location.href = `${year}_${diff}.html`;
}
</script>
</body>
</html>
